server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

messaging:
  pulsar:
    enabled: true
    service-url: pulsar://127.0.0.1:6650
    admin-url: http://127.0.0.1:8080
    tenant: ragent
    namespace: ai
    io-threads: 4
    listener-threads: 4
    operation-timeout-ms: 30000
    producer:
      send-timeout-ms: 30000
      block-if-queue-full: true
      batching-enabled: true
      batching-max-messages: 200
      batching-max-publish-delay-ms: 5
      compression-type: LZ4
    consumer:
      ack-timeout-seconds: 60
      negative-ack-delay-seconds: 30
      receiver-queue-size: 500
      max-redeliver-count: 8
    topics:
      knowledge-document-chunk: persistent://ragent/ai/knowledge-document-chunk
      message-feedback: persistent://ragent/ai/message-feedback

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    working-keep-turns: 4
    working-cache-ttl-minutes: 30
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30
    short-term-retention-days: 30
    short-term-decay-factor: 0.03
    long-term-enabled: true
    long-term-importance-threshold: 0.6
    semantic-enabled: true
    quality-assessment-enabled: true
    cleanup-cron: "0 0/30 * * * ?"
    idle-consolidation-minutes: 30
    idle-consolidation-batch-size: 50
    max-memory-token-budget: 1800
    working-memory-token-ratio: 0.4
    short-term-token-ratio: 0.3
    long-term-token-ratio: 0.2
    semantic-token-ratio: 0.1
    short-term-top-k: 5
    long-term-top-k: 3
    semantic-top-k: 2
    cleanup-decay-threshold: 0.15

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false

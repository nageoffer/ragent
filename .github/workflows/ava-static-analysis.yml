name: Java Static Analysis

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17 with Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run static analysis
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn clean verify -DskipTests

      - name: Debug report files
        if: always()
        run: |
          echo "==== Checkstyle ===="
          find . -type f \( -path "*/target/reports/checkstyle.html" -o -path "*/target/checkstyle-result.xml" \) | sort || true

          echo "==== PMD ===="
          find . -type f \( -path "*/target/reports/pmd.html" -o -path "*/target/pmd.xml" \) | sort || true

          echo "==== SpotBugs ===="
          find . -type f \( -path "*/target/site/spotbugs.html" -o -name "spotbugs.xml" -o -name "spotbugsXml.xml" \) | sort || true

          echo "==== Dependency-Check ===="
          find . -type f -path "*/target/dependency-check-report.html" | sort || true

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            **/target/reports/checkstyle.html
            **/target/checkstyle-result.xml
            **/target/checkstyle-checker.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports
          path: |
            **/target/reports/pmd.html
            **/target/pmd.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            **/target/site/spotbugs.html
            **/target/spotbugs.xml
            **/target/spotbugsXml.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            **/target/dependency-check-report.html
          retention-days: 7
          if-no-files-found: warn